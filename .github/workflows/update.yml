name: Update CRAN Queue

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cran-queue-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release

      - name: Install RSQLite
        run: Rscript -e 'install.packages("RSQLite", repos = "https://cloud.r-project.org")'

      - name: Download previous database
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --pattern "queue.db" || echo "No previous release found, starting fresh."

      - name: Import historical data (if needed)
        run: Rscript scripts/import-history.R queue.db

      - name: Run update script
        run: Rscript scripts/update.R queue.db

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v$(date -u +'%Y%m%d-%H%M%S')"
          gh release create "$TAG" \
            queue.db \
            --title "Queue snapshot $TAG" \
            --notes-file release_notes.md \
            --latest
